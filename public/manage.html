<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyBloc — Manage Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1b2d; color: #f1f5f9; }
    .container { max-width: 520px; margin: 0 auto; padding: 32px 20px; }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { font-size: 28px; margin-bottom: 4px; }
    .header p { color: rgba(255,255,255,0.6); font-size: 15px; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 28px; box-shadow: 0 4px 32px rgba(0,0,0,0.3); }
    label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; margin-top: 20px; color: rgba(255,255,255,0.8); }
    label:first-of-type { margin-top: 0; }
    .email-display { padding: 10px 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; font-size: 15px; color: rgba(255,255,255,0.55); }
    select { width: 100%; padding: 10px 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; font-size: 15px; background: rgba(255,255,255,0.06); color: #f1f5f9; }
    .radio-group, .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .radio-group label, .checkbox-group label { font-weight: 400; display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.06); padding: 8px 14px; border-radius: 12px; cursor: pointer; margin: 0; font-size: 14px; color: rgba(255,255,255,0.55); transition: all 0.2s; }
    .radio-group label:has(input:checked), .checkbox-group label:has(input:checked) { background: rgba(212,168,67,0.12); border: 1px solid rgba(212,168,67,0.35); color: #d4a843; }
    .radio-group label { border: 1px solid transparent; }
    .checkbox-group label { border: 1px solid transparent; }
    .kids-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .kids-row label { margin: 0; font-weight: 400; font-size: 14px; color: rgba(255,255,255,0.55); }
    .section-label { font-weight: 600; font-size: 14px; margin-top: 20px; margin-bottom: 4px; color: #ffffff; }
    .tier-label { font-size: 12px; color: rgba(255,255,255,0.35); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 12px; margin-bottom: 4px; }
    .tier-label:first-of-type { margin-top: 0; }
    button { width: 100%; margin-top: 28px; padding: 12px; background: #d4a843; color: #0f1b2d; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.25s; box-shadow: 0 4px 16px rgba(212,168,67,0.25); }
    button:hover { background: #e0b856; box-shadow: 0 4px 24px rgba(212,168,67,0.4); }
    button:disabled { background: rgba(212,168,67,0.3); color: rgba(255,255,255,0.3); cursor: not-allowed; box-shadow: none; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 12px; font-size: 14px; text-align: center; }
    .msg.success { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
    .msg.error { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
    .loading { text-align: center; padding: 48px; color: rgba(255,255,255,0.55); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><a href="/" style="text-decoration:none;color:#ffffff;letter-spacing:-0.5px;">my<span style="color:#d4a843;">bloc</span></a></h1>
      <p>Update your profile to get more relevant digests.</p>
    </div>
    <div class="card">
      <div id="loading" class="loading">Loading your profile...</div>
      <form id="profile-form" style="display:none;">
        <label>Email</label>
        <div class="email-display" id="email-display"></div>

        <label>City</label>
        <div class="email-display" id="city-display"></div>

        <label for="ward">Ward</label>
        <select id="ward" name="ward" required>
          <option value="">Select your ward</option>
          <option value="A">Ward A — Greenville</option>
          <option value="B">Ward B — West Side</option>
          <option value="C">Ward C — Journal Square</option>
          <option value="D">Ward D — The Heights</option>
          <option value="E">Ward E — Historic Downtown</option>
          <option value="F">Ward F — Bergen-Lafayette</option>
        </select>
        <p style="margin-top:6px;font-size:13px;"><a href="https://data.jerseycitynj.gov/map/map0/" target="_blank" rel="noopener" style="color:#d4a843;text-decoration:none;">Not sure? Find your ward on the city map &rarr;</a></p>

        <label>Housing</label>
        <div class="radio-group">
          <label><input type="radio" name="housing" value="Renter" required><span>Renter</span></label>
          <label><input type="radio" name="housing" value="Homeowner"><span>Homeowner</span></label>
          <label><input type="radio" name="housing" value="Section 8"><span>Section 8</span></label>
        </div>

        <label>Transportation</label>
        <div class="radio-group">
          <label><input type="radio" name="transport" value="No car" required><span>No car</span></label>
          <label><input type="radio" name="transport" value="Car owner"><span>Car owner</span></label>
          <label><input type="radio" name="transport" value="Transit dependent"><span>Transit dependent</span></label>
        </div>

        <label for="income">Household income</label>
        <select id="income" name="income">
          <option value="">Prefer not to say</option>
          <option value="Under $50K">Under $50K</option>
          <option value="$50K-$100K">$50K–$100K</option>
          <option value="$100K-$200K">$100K–$200K</option>
          <option value="Over $200K">Over $200K</option>
        </select>

        <label>Children</label>
        <div class="kids-row">
          <input type="checkbox" id="has_kids" name="has_kids">
          <label for="has_kids">I have school-age children</label>
        </div>

        <div class="section-label">What topics matter to you?</div>

        <div class="tier-label">Daily Life</div>
        <div class="checkbox-group">
          <label><input type="checkbox" name="interests" value="rent control"><span>Rent control</span></label>
          <label><input type="checkbox" name="interests" value="property tax"><span>Property tax</span></label>
          <label><input type="checkbox" name="interests" value="parking"><span>Parking</span></label>
          <label><input type="checkbox" name="interests" value="noise"><span>Noise</span></label>
          <label><input type="checkbox" name="interests" value="utilities"><span>Utilities</span></label>
        </div>

        <div class="tier-label">Getting Around</div>
        <div class="checkbox-group">
          <label><input type="checkbox" name="interests" value="transit"><span>Transit</span></label>
          <label><input type="checkbox" name="interests" value="bike lanes"><span>Bike lanes</span></label>
          <label><input type="checkbox" name="interests" value="roads"><span>Roads</span></label>
          <label><input type="checkbox" name="interests" value="sidewalks"><span>Sidewalks</span></label>
        </div>

        <div class="tier-label">Community</div>
        <div class="checkbox-group">
          <label><input type="checkbox" name="interests" value="schools"><span>Schools</span></label>
          <label><input type="checkbox" name="interests" value="parks"><span>Parks</span></label>
          <label><input type="checkbox" name="interests" value="public safety"><span>Public safety</span></label>
          <label><input type="checkbox" name="interests" value="senior services"><span>Senior services</span></label>
          <label><input type="checkbox" name="interests" value="youth programs"><span>Youth programs</span></label>
        </div>

        <div class="tier-label">Growth &amp; Economy</div>
        <div class="checkbox-group">
          <label><input type="checkbox" name="interests" value="development"><span>Development</span></label>
          <label><input type="checkbox" name="interests" value="zoning"><span>Zoning</span></label>
          <label><input type="checkbox" name="interests" value="jobs"><span>Jobs</span></label>
          <label><input type="checkbox" name="interests" value="small business"><span>Small business</span></label>
          <label><input type="checkbox" name="interests" value="affordable housing"><span>Affordable housing</span></label>
        </div>

        <button type="submit">Save Changes</button>
      </form>
      <div id="msg" class="msg" style="display:none;"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('user');
    const form = document.getElementById('profile-form');
    const loading = document.getElementById('loading');
    const msg = document.getElementById('msg');

    if (!userId) {
      loading.textContent = 'Invalid link. Please use the link from your digest email.';
    } else {
      loadProfile();
    }

    async function loadProfile() {
      try {
        const res = await fetch(`/api/profile?user=${userId}`);
        if (!res.ok) {
          loading.textContent = 'Profile not found.';
          return;
        }
        const profile = await res.json();

        document.getElementById('email-display').textContent = profile.email;
        document.getElementById('city-display').textContent = profile.city || 'Jersey City';
        form.ward.value = profile.ward || '';
        form.income.value = profile.income || '';

        if (profile.housing) {
          const radio = form.querySelector(`input[name="housing"][value="${profile.housing}"]`);
          if (radio) radio.checked = true;
        }
        if (profile.transport) {
          const radio = form.querySelector(`input[name="transport"][value="${profile.transport}"]`);
          if (radio) radio.checked = true;
        }
        form.has_kids.checked = profile.has_kids || false;

        if (Array.isArray(profile.interests)) {
          profile.interests.forEach(interest => {
            const cb = form.querySelector(`input[name="interests"][value="${interest}"]`);
            if (cb) cb.checked = true;
          });
        }

        loading.style.display = 'none';
        form.style.display = 'block';
      } catch (err) {
        loading.textContent = 'Failed to load profile. Please try again.';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Saving...';
      msg.style.display = 'none';

      const interests = Array.from(form.querySelectorAll('input[name="interests"]:checked')).map(el => el.value);
      const housing = form.querySelector('input[name="housing"]:checked');
      const transport = form.querySelector('input[name="transport"]:checked');

      const body = {
        ward: form.ward.value,
        housing: housing ? housing.value : undefined,
        transport: transport ? transport.value : undefined,
        income: form.income.value || null,
        has_kids: form.has_kids.checked,
        interests
      };

      try {
        const res = await fetch(`/api/profile?user=${userId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (res.ok) {
          msg.className = 'msg success';
          msg.textContent = 'Profile updated! Your next digest will reflect these changes.';
          msg.style.display = 'block';
        } else {
          const data = await res.json();
          msg.className = 'msg error';
          msg.textContent = data.error || 'Failed to save changes.';
          msg.style.display = 'block';
        }
      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = 'Network error. Please try again.';
        msg.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Save Changes';
    });
  </script>
</body>
</html>
